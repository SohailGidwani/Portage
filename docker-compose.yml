# Portage — canonical local/VM stack. `docker compose up` brings up the whole thing.
# Phase 0 services: db (Postgres+pgvector), api (FastAPI), worker (LangGraph), frontend.
#
# Startup ordering via healthchecks:  db (healthy) -> api (migrates, then healthy) -> worker.
# The worker waiting on api means the schema exists before it claims jobs.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portage}
      POSTGRES_USER: ${POSTGRES_USER:-portage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portage}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portage} -d ${POSTGRES_DB:-portage}"]
      interval: 3s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/backend
    env_file: .env
    environment:
      POSTGRES_HOST: db
    command: ["sh", "docker/entrypoint-api.sh"]
    ports:
      - "8000:8000"
    volumes:
      # Read-only: GET /jobs/{id}/report serves report.json off the shared volume. Only
      # the worker writes to it.
      - workspaces:/workspaces:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  worker:
    build:
      context: ./apps/backend
    env_file: .env
    environment:
      POSTGRES_HOST: db
    command: ["python", "-m", "portage_agent.worker"]
    volumes:
      # Shared per-job workspaces (also mounted into the ephemeral sandbox by name).
      - workspaces:/workspaces
      # Docker-out-of-Docker: spawn the sandbox as a sibling via the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # The Phase 1 fixture repo, so Ingest can clone it (repo_url=/fixtures/sample_repo).
      - ./apps/backend/tests/fixtures:/fixtures:ro
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
    environment:
      # Browser-side fetches hit the host-mapped API port (NOT the `api` service name).
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # Ephemeral test-runner image. Behind the `tools` profile so `docker compose up` never
  # starts it; the worker `docker run`s it per verification. Build it explicitly with:
  #   docker compose --profile tools build sandbox
  sandbox:
    profiles: ["tools"]
    image: portage-sandbox:latest
    build:
      context: ./apps/backend/sandbox
      dockerfile: Dockerfile.sandbox
    command: ["true"]

volumes:
  pgdata:
  workspaces:

# Portage — canonical local/VM stack. `docker compose up` brings up the whole thing.
# Services: db (Postgres+pgvector), api (FastAPI), worker (LangGraph), frontend, and —
# hosted only — caddy (TLS edge; enable with COMPOSE_PROFILES=edge in .env).
#
# Startup ordering via healthchecks:  db (healthy) -> api (migrates, then healthy) -> worker.
# The worker waiting on api means the schema exists before it claims jobs.
#
# Port policy (P8): app services bind to 127.0.0.1 only — on the hosted box the sole
# public listener is Caddy on 80/443; on a dev machine localhost:8000/3000 keep working
# (the DoD scripts and the Stage-2 smoke test in the runbook rely on host-local curl).
# Stage-1 IP smoke testing re-publishes the API via docker-compose.stage1.yml.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portage}
      POSTGRES_USER: ${POSTGRES_USER:-portage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portage}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portage} -d ${POSTGRES_DB:-portage}"]
      interval: 3s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    command: ["sh", "docker/entrypoint-api.sh"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Read-only: GET /jobs/{id}/report serves report.json off the shared volume. Only
      # the worker writes to it.
      - workspaces:/workspaces:ro
      # Corpus manifest, for tier labels on the /eval/leaderboard proof page.
      - ./corpus:/corpus:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  worker:
    build:
      context: ./apps/backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    command: ["python", "-m", "portage_agent.worker"]
    volumes:
      # Shared per-job workspaces (also mounted into the ephemeral sandbox by name).
      - workspaces:/workspaces
      # Docker-out-of-Docker: spawn the sandbox as a sibling via the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # The Phase 1 fixture repo, so Ingest can clone it (repo_url=/fixtures/sample_repo).
      - ./apps/backend/tests/fixtures:/fixtures:ro
      # Eval corpus manifest (Phase 4). The harness runs as `docker compose run --rm
      # worker python -m portage_agent.eval` and reads /corpus/corpus.toml.
      - ./corpus:/corpus:ro
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      args:
        # NEXT_PUBLIC_* is inlined into the client bundle at BUILD time — it must be a
        # build arg, not runtime environment. Local default: the host-mapped API port.
        # Hosted: https://<domain>/api (same origin, through Caddy).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # TLS edge (hosted only): the single public listener. Terminates HTTPS for the DuckDNS
  # hostname (automatic Let's Encrypt) and reverse-proxies /api/* -> api, rest -> frontend.
  # Behind the `edge` profile so local `docker compose up` never starts it; the hosted box
  # sets COMPOSE_PROFILES=edge in .env.
  caddy:
    image: caddy:2
    profiles: ["edge"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

  # Ephemeral test-runner image. Behind the `tools` profile so `docker compose up` never
  # starts it; the worker `docker run`s it per verification. Build it explicitly with:
  #   docker compose --profile tools build sandbox
  sandbox:
    profiles: ["tools"]
    image: portage-sandbox:latest
    build:
      context: ./apps/backend/sandbox
      dockerfile: Dockerfile.sandbox
    command: ["true"]

volumes:
  pgdata:
  workspaces:
  caddy_data:
  caddy_config:

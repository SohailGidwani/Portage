# Portage eval corpus — the pinned benchmark set (plan §11).
# Every entry must be reproducible: bundled fixtures ship in-repo; remote repos get a
# pinned `ref` (commit SHA). Selection criteria live in README.md next to this file.

version = 1

[[repos]]
name = "flask-items-fixture"
repo_url = "/fixtures/flask_app"
recipe = "flask_to_fastapi"
tier = "baseline"
stresses = ["routing", "blueprints", "error_handlers", "query_json_parsing"]
source = "bundled"
notes = "Bundled Phase-2 fixture: app factory, blueprint, query/JSON parsing, error handlers, 6 behavioural tests. Offline-clean dependencies."

[[repos]]
name = "minimal-flask-api"
repo_url = "https://github.com/markdouthwaite/minimal-flask-api"
recipe = "flask_to_fastapi"
ref = "91ae6abe493bef44fb21e4b9c34e8e94d9d2eae9"
test_args = ["tests/test_api.py"]
tier = "baseline"
stresses = ["routing", "json_body", "error_handlers"]
source = "github"
notes = "MIT. 2 tests, green in sandbox 2026-07-07. Locust load test excluded via test_args (needs network)."

[[repos]]
name = "flaskr"
repo_url = "https://github.com/pallets/flask"
recipe = "flask_to_fastapi"
ref = "36e4a824f340fdee7ed50937ba8e7f6bc7d17f81"
subdir = "examples/tutorial"
tier = "structural"
stresses = ["app_factory", "blueprints", "auth_views", "sqlite_db", "templates"]
source = "github"
notes = "BSD (pallets/flask). The canonical Flask tutorial app, lifted from examples/tutorial. 24 tests, green in sandbox 2026-07-08."

[[repos]]
name = "watchlist"
repo_url = "https://github.com/helloflask/watchlist"
recipe = "flask_to_fastapi"
ref = "006f830f6bb10f97e86e5adfe162bde0efe58210"
tier = "structural"
stresses = ["flask_sqlalchemy", "flask_login", "templates", "forms"]
source = "github"
notes = "MIT (Grey Li tutorial app). 15 tests, green in sandbox 2026-07-08. flask-sqlalchemy 3.1.1 + flask-login baked into sandbox."

[[repos]]
name = "microblog"
repo_url = "https://github.com/miguelgrinberg/microblog"
recipe = "flask_to_fastapi"
ref = "a975ef64864354867c88e0ed3a17ba7d17dca752"
test_args = ["tests.py"]
tier = "heavy"
stresses = ["flask_login", "flask_sqlalchemy", "flask_mail", "babel", "tokens", "unittest_style_tests"]
source = "github"
notes = "MIT (Grinberg mega-tutorial). 34 py files. 4 unittest-style tests in tests.py (pytest collects them). mail/migrate/moment/httpauth/wtf/pyjwt/langdetect/elasticsearch/rq baked."

[[repos]]
name = "flask-restx-api"
repo_url = "https://github.com/Anishmourya/flask-restx-api"
recipe = "flask_to_fastapi"
ref = "6e64a22ce14dd97d69809c3b50cb5781918fd1d4"
tier = "framework"
stresses = ["flask_restx", "namespaces", "marshalling"]
source = "github"
notes = "MIT. 4 tests, green in sandbox 2026-07-07. Flask-RESTX namespaces/marshalling -> routers + Pydantic: expected-hard (taxonomy tier 7); failures here feed the known-limitations finding. flask-restx==1.3.0 baked into the sandbox image."
